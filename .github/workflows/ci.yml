name: Huff-a-Puff CI

# This tells GitHub WHEN to run the tests
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # --- JOB 1: THE BACKEND (FastAPI) ---
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip' # Speeds up installation

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # We install pytest and httpx specifically for testing
        pip install pytest httpx 
        pip install -r requirements.txt

    - name: Run Pytest
      env:
        # Dummy environment variables so your app doesn't crash on startup
        SECRET_KEY: "test_secret_key"
        ALGORITHM: "HS256"
        REDIS_URL: "redis://localhost:6379"
      run: |
        pytest

  # --- JOB 2: THE FRONTEND (Next.js) ---
  frontend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'

    - name: Install dependencies
      run: npm ci # Faster and stricter than npm install

    - name: Run Linter
      run: npm run lint

    - name: Test Build (Ensures Vercel won't crash)
      run: npm run build